<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none">
  <defs>
    <radialGradient id="logoBg" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#fde8f0"/>
      <stop offset="100%" stop-color="#f4a1bc"/>
    </radialGradient>
  </defs>

  <!-- Circle base -->
  <circle cx="22" cy="22" r="22" fill="url(#logoBg)"/>
  <circle cx="22" cy="22" r="19.5" fill="none" stroke="rgba(224,99,142,.3)" stroke-width="1"/>

  <!-- Heart shape -->
  <path d="M22 33 C19 30.5 8 25 8 17 C8 12 12.5 9.5 16.5 11.2 C18.5 12.2 20 13.8 22 16 C24 13.8 25.5 12.2 27.5 11.2 C31.5 9.5 36 12 36 17 C36 25 25 30.5 22 33Z"
        fill="#e0638e"/>

  <!-- Subtle highlight on heart -->
  <path d="M22 33 C19 30.5 8 25 8 17 C8 12 12.5 9.5 16.5 11.2"
        fill="none" stroke="rgba(255,255,255,.25)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Airplane (white silhouette, rotated, sitting at top of heart) -->
  <g transform="translate(22,15.5) rotate(-35)">
    <!-- Fuselage -->
    <ellipse cx="0" cy="0" rx="1.3" ry="4" fill="white" opacity=".95"/>
    <!-- Left wing -->
    <path d="M-1.3 0.5 L-5 2.2 L-1.3 1.4Z" fill="white" opacity=".9"/>
    <!-- Right wing -->
    <path d="M1.3 0.5 L5 2.2 L1.3 1.4Z" fill="white" opacity=".9"/>
    <!-- Left tail -->
    <path d="M-1.1 2.8 L-3 5 L-1.1 3.8Z" fill="white" opacity=".8"/>
    <!-- Right tail -->
    <path d="M1.1 2.8 L3 5 L1.1 3.8Z" fill="white" opacity=".8"/>
  </g>

  <!-- Small dot trail (dotted path = plane's flight path) -->
  <circle cx="26" cy="12" r="1" fill="white" opacity=".5"/>
  <circle cx="29" cy="11" r=".8" fill="white" opacity=".35"/>
  <circle cx="32" cy="11.5" r=".6" fill="white" opacity=".2"/>
</svg>
